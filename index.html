<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escala Profissional</title>

<style>
body { font-family: Arial; background:#f1f2f6; margin:20px;}
h1 { text-align:center;}

table { width:100%; border-collapse:collapse; background:white;}
th { background:#2f3542; color:white;}
th, td { border:1px solid #ccc; padding:6px; text-align:center;}

select { width:100%; padding:5px;}

.h8 { background:#dff9fb;}
.h830 { background:#f6e58d;}
.h9 { background:#ffbe76;}
</style>
</head>

<body>

<h1>Escala Mensal</h1>

<button onclick="gerar()">Gerar Escala</button>

<table>
<thead>
<tr>
<th>Data</th>
<th>Dia</th>
<th>Maria</th>
<th>Fernanda</th>
<th>Camila</th>
<th>Samyra</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>
const pessoas = ["Maria","Fernanda","Camila","Samyra"];

const horarios = [
    {t:"08h - 17h", c:"h8"},
    {t:"08h30 - 17h30", c:"h830"},
    {t:"09h - 18h", c:"h9"}
];

function nomeDia(d){
    return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()];
}

function gerar(){
    let tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    let hoje = new Date();
    let mes = hoje.getMonth();
    let ano = hoje.getFullYear();

    let dias = new Date(ano, mes+1, 0).getDate();

    for(let d=1; d<=dias; d++){
        let data = new Date(ano, mes, d);
        let diaSemana = data.getDay();

        // PULAR sábado (6) e domingo (0)
        if(diaSemana === 0 || diaSemana === 6) continue;

        let tr = document.createElement("tr");

        tr.innerHTML += `<td>${d}</td>`;
        tr.innerHTML += `<td>${nomeDia(data)}</td>`;

        // lógica de rodízio
        let base = (d % 4);

        let distribuicao = [
            horarios[0], // 08h
            horarios[0], // 08h
            horarios[1], // 08h30
            horarios[2]  // 09h
        ];

        // embaralha com rodízio
        distribuicao = distribuicao.map((_,i,arr)=>{
            return arr[(i + base) % 4];
        });

        distribuicao.forEach((h)=>{
            let select = document.createElement("select");

            horarios.forEach((opt,i)=>{
                let option = document.createElement("option");
                option.value = i;
                option.text = opt.t;
                if(opt.t === h.t) option.selected = true;
                select.appendChild(option);
            });

            select.onchange = ()=>{
                aplicarCor(select);
            };

            let td = document.createElement("td");
            td.appendChild(select);

            aplicarCor(select);

            tr.appendChild(td);
        });

        tabela.appendChild(tr);
    }
}

function aplicarCor(select){
    let td = select.parentElement;
    td.className = horarios[select.value].c;
}
</script>

</body>
</html>
