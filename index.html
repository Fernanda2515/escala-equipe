<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escala Profissional</title>

<style>
body { font-family: Arial; background:#eef2f7; margin:0;}

header {
    background:#2f3542;
    color:white;
    text-align:center;
    padding:15px;
}

header img {
    height:60px;
    display:block;
    margin:0 auto 10px;
}

.container { padding:20px; }

.controls, .ferias {
    text-align:center;
    margin-bottom:20px;
}

input, select, button {
    padding:8px;
    margin:5px;
    border-radius:5px;
}

button {
    background:#3742fa;
    color:white;
    border:none;
}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th { background:#3742fa; color:white;}

th, td {
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}

.h8 { background:#dff9fb;}
.h830 { background:#f6e58d;}
.h9 { background:#ffbe76;}
.folga { background:#dcdde1;}
</style>
</head>

<body>

<header>
<img src="SUA-IMAGEM-AQUI.png" alt="Logo">
<h2>Escala de Trabalho</h2>
</header>

<div class="container">

<div class="controls">
Mês:
<input type="number" id="mes" value="4">
Ano:
<input type="number" id="ano" value="2026">
<button onclick="gerar()">Gerar Escala</button>
</div>

<div class="ferias">
<h3>Férias / Folga</h3>
<select id="colab">
<option>Maria</option>
<option>Fernanda</option>
<option>Camila</option>
<option>Samyra</option>
</select>

Início:
<input type="date" id="inicio">
Fim:
<input type="date" id="fim">

<button onclick="addFerias()">Adicionar</button>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Dia</th>
<th>Maria</th>
<th>Fernanda</th>
<th>Camila</th>
<th>Samyra</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

</div>

<script>
const pessoas = ["Maria","Fernanda","Camila","Samyra"];

const horarios = [
    {t:"08h - 17h", c:"h8"},
    {t:"08h30 - 17h30", c:"h830"},
    {t:"09h - 18h", c:"h9"}
];

let ferias = [];

function addFerias(){
    ferias.push({
        nome: document.getElementById("colab").value,
        inicio: new Date(document.getElementById("inicio").value),
        fim: new Date(document.getElementById("fim").value)
    });

    alert("Período adicionado!");
}

function nomeDia(d){
    return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()];
}

function estaDeFerias(nome, data){
    return ferias.some(f => 
        f.nome === nome &&
        data >= f.inicio &&
        data <= f.fim
    );
}

function gerar(){
    let mes = parseInt(document.getElementById("mes").value) - 1;
    let ano = parseInt(document.getElementById("ano").value);

    let tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    let dias = new Date(ano, mes+1, 0).getDate();
    let semanaIndex = 0;

    for(let d=1; d<=dias; d++){
        let data = new Date(ano, mes, d);
        let diaSemana = data.getDay();

        if(diaSemana === 0 || diaSemana === 6) continue;

        if(diaSemana === 1 && d !== 1) semanaIndex++;

        let tr = document.createElement("tr");

        let dataFormatada = `${String(d).padStart(2,"0")}/${String(mes+1).padStart(2,"0")}/${ano}`;

        tr.innerHTML += `<td>${dataFormatada}</td>`;
        tr.innerHTML += `<td>${nomeDia(data)}</td>`;

        let base = semanaIndex % 4;

        let distribuicao = [
            horarios[0],
            horarios[0],
            horarios[1],
            horarios[2]
        ];

        distribuicao = distribuicao.map((_,i,arr)=>{
            return arr[(i + base) % 4];
        });

        pessoas.forEach((p,i)=>{
            let td = document.createElement("td");

            if(estaDeFerias(p, data)){
                td.innerText = "Férias";
                td.className = "folga";
            } else {
                let h = distribuicao[i];

                let select = document.createElement("select");

                horarios.forEach((opt,index)=>{
                    let option = document.createElement("option");
                    option.value = index;
                    option.text = opt.t;
                    if(opt.t === h.t) option.selected = true;
                    select.appendChild(option);
                });

                select.onchange = ()=> aplicarCor(select);

                td.appendChild(select);
                aplicarCor(select);
            }

            tr.appendChild(td);
        });

        tabela.appendChild(tr);
    }
}

function aplicarCor(select){
    let td = select.parentElement;
    td.className = horarios[select.value].c;
}
</script>

</body>
</html>
