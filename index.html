<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escala Profissional</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    margin: 0;
}

header {
    background: #2f3542;
    color: white;
    padding: 15px;
    text-align: center;
}

header img {
    height: 60px;
    display: block;
    margin: 0 auto 10px;
}

.container {
    padding: 20px;
}

h1 {
    text-align: center;
}

.controls {
    text-align: center;
    margin-bottom: 20px;
}

input, button {
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #3742fa;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2f3542;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #3742fa;
    color: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

select {
    width: 100%;
    padding: 5px;
    border-radius: 5px;
}

.h8 { background: #dff9fb;}
.h830 { background: #f6e58d;}
.h9 { background: #ffbe76;}

</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo">
    <h2>Escala de Trabalho</h2>
</header>

<div class="container">

<div class="controls">
Mês:
<input type="number" id="mes" min="1" max="12" value="4">
Ano:
<input type="number" id="ano" value="2026">

<button onclick="gerar()">Gerar Escala</button>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Dia</th>
<th>Maria</th>
<th>Fernanda</th>
<th>Camila</th>
<th>Samyra</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

</div>

<script>
const pessoas = ["Maria","Fernanda","Camila","Samyra"];

const horarios = [
    {t:"08h - 17h", c:"h8"},
    {t:"08h30 - 17h30", c:"h830"},
    {t:"09h - 18h", c:"h9"}
];

function nomeDia(d){
    return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()];
}

function gerar(){
    let mes = parseInt(document.getElementById("mes").value) - 1;
    let ano = parseInt(document.getElementById("ano").value);

    let tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    let dias = new Date(ano, mes+1, 0).getDate();
    let semanaIndex = 0;

    for(let d=1; d<=dias; d++){
        let data = new Date(ano, mes, d);
        let diaSemana = data.getDay();

        if(diaSemana === 0 || diaSemana === 6) continue;

        if(diaSemana === 1 && d !== 1) semanaIndex++;

        let tr = document.createElement("tr");

        let dataFormatada = `${String(d).padStart(2,"0")}/${String(mes+1).padStart(2,"0")}/${ano}`;

        tr.innerHTML += `<td>${dataFormatada}</td>`;
        tr.innerHTML += `<td>${nomeDia(data)}</td>`;

        let base = semanaIndex % 4;

        let distribuicao = [
            horarios[0],
            horarios[0],
            horarios[1],
            horarios[2]
        ];

        distribuicao = distribuicao.map((_,i,arr)=>{
            return arr[(i + base) % 4];
        });

        distribuicao.forEach(h=>{
            let select = document.createElement("select");

            horarios.forEach((opt,i)=>{
                let option = document.createElement("option");
                option.value = i;
                option.text = opt.t;
                if(opt.t === h.t) option.selected = true;
                select.appendChild(option);
            });

            select.onchange = ()=> aplicarCor(select);

            let td = document.createElement("td");
            td.appendChild(select);

            aplicarCor(select);

            tr.appendChild(td);
        });

        tabela.appendChild(tr);
    }
}

function aplicarCor(select){
    let td = select.parentElement;
    td.className = horarios[select.value].c;
}
</script>

</body>
</html>
